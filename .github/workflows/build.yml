name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src-ui/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore CKAN/CKAN-Modern.csproj

      - name: Publish CKAN Modern
        # dotnet publish in Release config automatically runs:
        #   npm ci && npm run build  (in src-ui/)
        # which outputs the React bundle to CKAN/wwwroot/
        # then packages the .NET app into a self-contained EXE.
        # NOTE: wwwroot/ is NOT embedded in the EXE — WebView2 requires
        # it as a real folder on disk. We zip everything together below.
        run: dotnet publish CKAN/CKAN-Modern.csproj -c Release -o dist

      - name: Package release ZIP
        id: package
        run: |
          $buildNum = "${{ github.run_number }}"
          $zipName  = "CKAN-Modern-v2.0.0-build${buildNum}.zip"

          # ZIP the entire dist/ folder so wwwroot travels with the EXE
          Compress-Archive -Path dist\* -DestinationPath $zipName

          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-build.${{ github.run_number }}
          name: "CKAN Modern v2.0.0 Build ${{ github.run_number }}"
          files: ${{ steps.package.outputs.zip_name }}
          prerelease: true
          body: |
            Automated Windows build from commit ${{ github.sha }}

            ## Download & Run

            1. Download `${{ steps.package.outputs.zip_name }}` below
            2. Extract the ZIP anywhere (e.g. `C:\Games\CKAN-Modern\`)
            3. Run `CKAN-Modern.exe`

            > **Requires:** Windows 10/11 with [WebView2 Runtime](https://developer.microsoft.com/en-us/microsoft-edge/webview2/) — already installed on most machines via Microsoft Edge.

            ## What's in this build
            - Modern React + WebView2 UI (replaces WinForms)
            - AI-powered mod search — describe your playstyle, get mod suggestions
            - Markdown rendering + one-click install chips in AI chat
            - All original CKAN functionality preserved
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
