name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src-ui/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore CKAN/CKAN-Modern.csproj

      - name: Publish CKAN Modern
        # dotnet publish in Release config automatically runs:
        #   npm ci && npm run build  (in src-ui/)
        # which outputs the React bundle to CKAN/wwwroot/
        # then packages everything into a single self-contained EXE
        run: dotnet publish CKAN/CKAN-Modern.csproj -c Release -o dist

      - name: Find EXE
        id: find_exe
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Found: $($exe.FullName)"
            echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            echo "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No EXE found. Contents of dist/:"
            Get-ChildItem -Path dist
            exit 1
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0-build.${{ github.run_number }}
          name: "CKAN Modern v2.0.0 Build ${{ github.run_number }}"
          files: ${{ steps.find_exe.outputs.exe_path }}
          prerelease: true
          body: |
            Automated Windows build from commit ${{ github.sha }}

            **Download:** `${{ steps.find_exe.outputs.exe_name }}` below

            ### What's in this build
            - Modern React + WebView2 UI (replaces WinForms)
            - AI-powered mod search — describe your playstyle, get mod suggestions
            - Markdown rendering + one-click install chips in AI chat
            - All original CKAN functionality preserved
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
